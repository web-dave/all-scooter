<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AllScooter logo">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e6fd9"/>
      <stop offset="100%" stop-color="#0d3b8e"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <!-- Subtle top gloss -->
  <ellipse cx="256" cy="190" rx="190" ry="130" fill="url(#gloss)"/>

  <!-- ===== E-Scooter illustration ===== -->
  <!-- rear wheel -->
  <circle cx="158" cy="332" r="54" fill="none" stroke="white" stroke-width="20"/>
  <circle cx="158" cy="332" r="14" fill="white"/>

  <!-- front wheel -->
  <circle cx="360" cy="332" r="44" fill="none" stroke="white" stroke-width="18"/>
  <circle cx="360" cy="332" r="12" fill="white"/>

  <!-- deck (footboard) -->
  <rect x="148" y="294" width="210" height="22" rx="11" fill="white"/>

  <!-- stem (angled post from deck up to handlebar) -->
  <line x1="340" y1="304" x2="308" y2="190" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- handlebar cross piece -->
  <rect x="274" y="176" width="80" height="18" rx="9" fill="white"/>
  <!-- handlebar grips -->
  <rect x="268" y="172" width="18" height="26" rx="9" fill="white"/>
  <rect x="346" y="172" width="18" height="26" rx="9" fill="white"/>

  <!-- battery / body block on stem -->
  <rect x="303" y="218" width="30" height="48" rx="8" fill="white" opacity="0.85"/>

</svg>
