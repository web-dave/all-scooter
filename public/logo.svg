<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AllScooter logo">
  <!--
    Scooter at scale 1.0 (natural 200×120, centred at origin, pointing left):
      Front wheel (left): cx=−62  cy=24  r=23  sw=13
      Rear  wheel (right): cx= 55  cy=24  r=30  sw=16
      Deck: x=−76 y=2 w=138 h=18 rx=9
      Stem: (−42,2)→(−60,−47) sw=16
      T-bar: x=−82 y=−54 w=52 h=14 rx=7

    With −12° rotation the heavy wheels (cy=24) create a visual weight at y≈27
    in rotated group space.  Group centres are shifted 27 px ABOVE intended
    visual position so the arrangement appears centred at canvas (256,256):
      Intended visual centres: (321,326) (256,256) (191,186)   step (−65,−70)
      Adjusted translate y:    (321,299) (256,229) (191,159)
  -->

  <!-- Background – hotpink -->
  <circle cx="256" cy="256" r="256" fill="hotpink"/>

  <!-- ── Scooter 1 – front / bottom-right ── -->
  <g transform="translate(321,299) rotate(-12)">
    <circle cx="55"  cy="24" r="30" fill="none" stroke="white" stroke-width="16"/>
    <circle cx="55"  cy="24" r="9"  fill="white"/>
    <circle cx="-62" cy="24" r="23" fill="none" stroke="white" stroke-width="13"/>
    <circle cx="-62" cy="24" r="7"  fill="white"/>
    <rect x="-76" y="2"   width="138" height="18" rx="9" fill="white"/>
    <line  x1="-42" y1="2" x2="-60" y2="-47" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <rect x="-82" y="-54" width="52"  height="14" rx="7" fill="white"/>
  </g>

  <!-- ── Scooter 2 – middle ── -->
  <g transform="translate(256,229) rotate(-12)" opacity="0.78">
    <circle cx="55"  cy="24" r="30" fill="none" stroke="white" stroke-width="16"/>
    <circle cx="55"  cy="24" r="9"  fill="white"/>
    <circle cx="-62" cy="24" r="23" fill="none" stroke="white" stroke-width="13"/>
    <circle cx="-62" cy="24" r="7"  fill="white"/>
    <rect x="-76" y="2"   width="138" height="18" rx="9" fill="white"/>
    <line  x1="-42" y1="2" x2="-60" y2="-47" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <rect x="-82" y="-54" width="52"  height="14" rx="7" fill="white"/>
  </g>

  <!-- ── Scooter 3 – back / top-left ── -->
  <g transform="translate(191,159) rotate(-12)" opacity="0.55">
    <circle cx="55"  cy="24" r="30" fill="none" stroke="white" stroke-width="16"/>
    <circle cx="55"  cy="24" r="9"  fill="white"/>
    <circle cx="-62" cy="24" r="23" fill="none" stroke="white" stroke-width="13"/>
    <circle cx="-62" cy="24" r="7"  fill="white"/>
    <rect x="-76" y="2"   width="138" height="18" rx="9" fill="white"/>
    <line  x1="-42" y1="2" x2="-60" y2="-47" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <rect x="-82" y="-54" width="52"  height="14" rx="7" fill="white"/>
  </g>
</svg>
