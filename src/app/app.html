<div class="app-shell">
  <header class="menu-bar">
    <a class="menu-bar__brand" href="/" aria-label="AllScooter home">
      <img class="menu-bar__logo" src="logo.svg" alt="" width="32" height="32" aria-hidden="true" />
      <span class="menu-bar__title">All Scooter</span>
    </a>

    <button class="menu-bar__reload" type="button" (click)="reloadBikes()">Reload</button>
  </header>

  <main class="map-layout">
    <section class="map-card" aria-label="Scooter map">
      @if (maps()) {
        <app-map />
      }
    </section>
  </main>
</div>
