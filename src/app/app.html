<google-map height="400px" width="750px" mapId="scooterMap" [zoom]="12" [center]="center">
  <map-marker-clusterer>
    @for (bike of bikes(); track $index) {
      <map-marker [position]="bike.latLng" [icon]="markerIcon(bike)" />
    }
  </map-marker-clusterer>
</google-map>
