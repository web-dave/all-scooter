<div class="app-shell">
  <header class="menu-bar">
    <div class="menu-bar__title">All Scooter</div>

    <button class="menu-bar__reload" type="button" (click)="reloadBikes()">Reload</button>
  </header>

  <main class="map-layout">
    <section class="map-card" aria-label="Scooter map">
      <google-map mapId="scooterMap" height="100%" width="100%" [zoom]="12" [center]="center()">
        <map-marker-clusterer>
          @for (bike of bikes(); track bike.bike_id) {
            <map-advanced-marker [position]="bike.latLng" />
          }
        </map-marker-clusterer>
      </google-map>
    </section>
  </main>
</div>
